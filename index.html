<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Martha 💜</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: radial-gradient(circle at center, #2a0050, #140028, #000);
}

/* ESTRELLAS */
.star {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    animation: brillo 2s infinite alternate;
}

@keyframes brillo {
    from {opacity: 0.2;}
    to {opacity: 1;}
}

/* FLORES */
.flor {
    position: absolute;
    font-size: 45px;
    cursor: pointer;
    transition: transform 0.2s;
}
.flor:hover {
    transform: scale(1.3);
}

/* MODAL */
.modal {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 300px;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: #c77dff;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

/* LLUVIA */
.lluvia {
    position: absolute;
    font-size: 25px;
    animation: caer linear infinite;
}

@keyframes caer {
    0% {transform: translateY(-10vh);}
    100% {transform: translateY(110vh);}
}
</style>
</head>

<body>

<div id="galaxia"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <p id="texto"></p>
        <button onclick="cerrar()">Volver 💜</button>
    </div>
</div>

<script>
let mensajes = [
"Eres la mejor mujer del mundo que Dios me ha mandado 💖",
"Siempre en las buenas, malas y peores estaremos juntos 💕",
"Tenga o no tenga dinero siempre estás ahí 💛",
"Las princesas como tú deben estar en Disney 👑",
"Tú eres mi bella y yo tu bestia 🥀",
"Eres mi lugar favorito 🌎",
"Contigo todo es más bonito 💕",
"Eres mi paz 🫶",
"Tu sonrisa es mi debilidad 😊",
"Eres mi sueño ✨",
"Gracias por existir 💖",
"Eres lo mejor que tengo 🥰",
"Siempre estaré para ti 💛",
"Te elegiría mil veces 💕",
"Eres mi historia favorita 📖",
"Te amo muchísimo Martha 💜"
];

let galaxia = document.getElementById("galaxia");
let modal = document.getElementById("modal");

/* ESTRELLAS */
for (let i = 0; i < 200; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(star);
}

/* FLORES SIN ENCIMARSE */
let posiciones = [];

function estaCerca(x, y) {
    for (let pos of posiciones) {
        let dx = pos.x - x;
        let dy = pos.y - y;
        let distancia = Math.sqrt(dx * dx + dy * dy);
        if (distancia < 15) return true; // distancia mínima
    }
    return false;
}

for (let i = 0; i < 25; i++) {
    let x, y;

    do {
        x = Math.random() * 90;
        y = Math.random() * 90;
    } while (estaCerca(x, y));

    posiciones.push({x, y});

    let flor = document.createElement("div");
    flor.className = "flor";
    flor.innerText = "🌻";

    flor.style.left = x + "vw";
    flor.style.top = y + "vh";

    let mensaje = mensajes[Math.floor(Math.random() * mensajes.length)];

    flor.onclick = () => {
        document.getElementById("texto").innerText = mensaje;
        modal.style.display = "flex";
    };

    galaxia.appendChild(flor);
}

/* CERRAR */
function cerrar() {
    modal.style.display = "none";
}

/* LLUVIA */
function lluvia() {
    let item = document.createElement("div");
    item.className = "lluvia";
    item.innerText = Math.random() > 0.5 ? "🌻" : "💜";

    item.style.left = Math.random() * 100 + "vw";
    item.style.animationDuration = (Math.random() * 2 + 2) + "s";

    document.body.appendChild(item);

    setTimeout(() => item.remove(), 4000);
}
setInterval(lluvia, 200);
</script>

</body>
</html>
