<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Martha 💛</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* VIDEO DE FONDO */
video {
    position: fixed;
    top: 0;
    left: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* TARJETA */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.85);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
}

h1 {
    font-size: 45px;
}

p {
    font-size: 22px;
}
</style>
</head>

<body>

<video autoplay muted loop>
    <source src="flores.mp4" type="video/mp4">
</video>

<div class="card">
    <h1>Para Martha 💛</h1>
    <p>Estas flores amarillas son para ti 🌻</p>
    <p>Porque iluminas mi vida como nadie más 💖</p>
    <p>Te quiero muchísimo 💛</p>
</div>

</body>
</html>
