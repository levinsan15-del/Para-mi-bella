<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para Martha ❤️</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
            text-align: center;
            color: #333;
            padding-top: 100px;
        }
        h1 {
            font-size: 50px;
            color: #fff;
        }
        p {
            font-size: 25px;
        }
        .card {
            background: white;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
            width: 60%;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Para Martha ❤️</h1>
        <p>Hola Martha,</p>
        <p>Hice esto especialmente para ti 💖</p>
        <p>Eres una persona muy importante para mí y quería que tuvieras algo único.</p>
        <p>Te quiero mucho 🌸</p>
    </div>

</body>
</html>
