<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Martha 💛</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* VIDEO */
video {
    position: fixed;
    top: 0;
    left: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* CONTENIDO */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.85);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 300px;
}

/* TEXTO */
h1 {
    font-size: 35px;
    margin-bottom: 10px;
}

#mensaje {
    font-size: 20px;
    margin: 20px 0;
}

/* BOTÓN */
button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #e63950;
}
</style>
</head>

<body>

<video autoplay muted loop>
    <source src="flores.mp4" type="video/mp4">
</video>

<div class="card">
    <h1>Para Martha 💛</h1>
    <p id="mensaje">Haz clic abajo ❤️</p>
    <button onclick="cambiarMensaje()">Presióname 💕</button>
</div>

<script>
let mensajes = [
    "Estas flores amarillas son para ti 🌻",
    "Porque iluminas mi vida 💛",
    "Eres lo mejor que me ha pasado 💖",
    "Me haces muy feliz 😊",
    "Te quiero muchísimo Martha 💕",
    "Nunca olvides lo especial que eres ✨"
];

let i = 0;

function cambiarMensaje() {
    document.getElementById("mensaje").innerText = mensajes[i];
    i++;
    if (i >= mensajes.length) {
        i = 0;
    }
}
</script>

</body>
</html>
